services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas_auth
      POSTGRES_PASSWORD: atlas_auth
      POSTGRES_DB: atlas_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_auth -d atlas_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
